<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
  <!-- Background -->
  <rect width="1000" height="800" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="20" y="40" font-family="monospace" font-size="18" font-weight="bold" fill="#4ec9b0">
    M2A-452: Feature 2 - Mermaid Diagram Generation
  </text>
  <line x1="20" y1="50" x2="980" y2="50" stroke="#4ec9b0" stroke-width="2"/>

  <!-- Test 1 -->
  <text x="20" y="90" font-family="monospace" font-size="14" font-weight="bold" fill="#569cd6">
    TEST 1: Generate Mermaid Diagram
  </text>
  <text x="20" y="115" font-family="monospace" font-size="12" fill="#ce9178">
    $ python -m csuite diagram --path ./sample_code --output architecture.mmd
  </text>
  <text x="40" y="140" font-family="monospace" font-size="12" fill="#4ec9b0" font-weight="bold">
    ✓ Mermaid diagram written to architecture.mmd
  </text>

  <!-- Test 2 -->
  <text x="20" y="180" font-family="monospace" font-size="14" font-weight="bold" fill="#569cd6">
    TEST 2: Generated File Contents
  </text>
  <rect x="20" y="195" width="960" height="320" fill="#252526" stroke="#4ec9b0" stroke-width="2"/>
  <text x="35" y="220" font-family="monospace" font-size="11" fill="#9cdcfe">
    <tspan x="35" dy="0">classDiagram</tspan>
    <tspan x="50" dy="18">namespace module_a {</tspan>
    <tspan x="70" dy="18">class BaseClass {</tspan>
    <tspan x="90" dy="18">-__init__(self, name: str)</tspan>
    <tspan x="90" dy="18">+greet(self) str</tspan>
    <tspan x="70" dy="18">}</tspan>
    <tspan x="70" dy="18">class SampleClass {</tspan>
    <tspan x="90" dy="18">-__init__(self, name: str, value: int = 0)</tspan>
    <tspan x="90" dy="18">+compute(self, x: int) int</tspan>
    <tspan x="70" dy="18">}</tspan>
    <tspan x="50" dy="18">}</tspan>
    <tspan x="50" dy="18">namespace module_b {</tspan>
    <tspan x="70" dy="18">class AnotherClass { ... }</tspan>
    <tspan x="70" dy="18">class ChildClass { ... }</tspan>
    <tspan x="50" dy="18">}</tspan>
    <tspan x="35" dy="18">ChildClass --|> SampleClass : extends</tspan>
    <tspan x="35" dy="18">SampleClass --|> BaseClass : extends</tspan>
  </text>

  <!-- Verification -->
  <text x="20" y="545" font-family="monospace" font-size="12" fill="#4ec9b0" font-weight="bold">
    ✓ Valid classDiagram syntax
  </text>
  <text x="20" y="565" font-family="monospace" font-size="12" fill="#4ec9b0" font-weight="bold">
    ✓ Namespace grouping by module
  </text>
  <text x="20" y="585" font-family="monospace" font-size="12" fill="#4ec9b0" font-weight="bold">
    ✓ Methods with visibility markers
  </text>
  <text x="20" y="605" font-family="monospace" font-size="12" fill="#4ec9b0" font-weight="bold">
    ✓ Inheritance edges present
  </text>

  <!-- Test 3 -->
  <text x="20" y="645" font-family="monospace" font-size="14" font-weight="bold" fill="#569cd6">
    TEST 3: Verify Feature 1 Still Works
  </text>
  <text x="20" y="670" font-family="monospace" font-size="12" fill="#ce9178">
    $ python -m csuite parse --path ./sample_code
  </text>
  <text x="40" y="695" font-family="monospace" font-size="12" fill="#4ec9b0" font-weight="bold">
    ✓ Found 3 modules, 4 classes, 11 functions, 3 imports
  </text>

  <!-- Footer -->
  <line x1="20" y1="730" x2="980" y2="730" stroke="#4ec9b0" stroke-width="2"/>
  <text x="500" y="765" font-family="monospace" font-size="18" font-weight="bold" fill="#4ec9b0" text-anchor="middle">
    ALL TESTS PASSED ✓
  </text>
</svg>
